# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

env:
  - CI_REGISTRY_IMAGE={{ if index .Env "CI_REGISTRY_IMAGE"  }}{{ .Env.CI_REGISTRY_IMAGE }}{{ else }}{{ .ProjectName }}{{ end }}

before:
  hooks:
    - go mod tidy

gitlab_urls:
  api: https://oaklab.hu/api/v4
  download: https://oaklab.hu
  use_package_registry: true
  use_job_token: true

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X oaklab.hu/debian/aptify/internal/constants.Version={{.Version}}

archives:
  - name_template: |-
      {{ .Binary }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end }}
    formats:
      - binary
    files:
      - none*

dockers_v2:
  - images:
      - '{{ .Env.CI_REGISTRY_IMAGE }}'
    tags:
      - '{{ with .Version }}v{{ . }}{{ end }}'
      - '{{ with .Major }}v{{ .Major }}{{ end }}'
      - '{{ with .Minor }}v{{ .Major }}.{{ .Minor }}{{ end }}'

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - 'Merge pull request'
      - 'Merge branch'
      - 'go mod tidy'
